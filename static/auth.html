<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GUARD | Secure Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0a0c;
            --accent-blue: #00d2ff;
            --accent-green: #00ff9d;
            --text-main: #e0e0e6;
            --text-muted: #888894;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin:0; padding:0; box-sizing:border-box; font-family:'Inter', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: radial-gradient(circle at top, #1a1a24 0%, #0a0a0c 100%);
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 50px;
            background: #121216;
            border-radius: 24px;
            border: 1px solid var(--glass);
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.5);
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--accent-blue); margin-bottom: 30px; letter-spacing: -1px; }
        .logo span { color: white; }

        h2 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }

        .input-group { text-align: left; margin-bottom: 20px; }
        label { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; color: var(--accent-blue); display: block; margin-bottom: 8px; }
        input { 
            width: 100%; 
            padding: 15px; 
            background: #000; 
            border: 1px solid var(--glass); 
            border-radius: 10px; 
            color: white; 
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }

        button {
            width: 100%;
            padding: 16px;
            background: var(--accent-blue);
            color: black;
            font-weight: 800;
            border: none;
            border-radius: 10px;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
        }
        button:hover { filter: brightness(1.1); transform: translateY(-2px); }

        .toggle-link { display: block; margin-top: 25px; color: var(--text-muted); text-decoration: none; font-size: 0.85rem; }
        .toggle-link span { color: var(--accent-blue); font-weight: 600; }

        #error-msg { color: #ff3e3e; font-size: 0.8rem; margin-top: 15px; display: none; }

        #success-onboarding { display: none; }
        code { background: #000; padding: 4px 8px; border-radius: 4px; color: var(--accent-green); font-family: monospace; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">GUARD</div>

        <!-- Mode: Login -->
        <div id="view-login">
            <h2>Welcome Back</h2>
            <p>Access your Security Command Center</p>
            
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="login-pass" placeholder="••••••••">
            </div>
            
            <button onclick="handleLogin()">Login to SOC</button>
            <a href="#" class="toggle-link" onclick="toggleMode('signup')">Don't have an account? <span>Sign Up</span></a>
        </div>

        <!-- Mode: Signup -->
        <div id="view-signup" style="display: none;">
            <h2>Start Protecting</h2>
            <p>Create your GUARD account in seconds</p>
            
            <div class="input-group">
                <label>Website Name</label>
                <input type="text" id="signup-site" placeholder="e.g. My Rental App">
            </div>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" id="signup-email" placeholder="you@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signup-pass" placeholder="••••••••">
            </div>
            
            <button onclick="handleSignup()">Create Account</button>
            <a href="#" class="toggle-link" onclick="toggleMode('login')">Already protected? <span>Login Here</span></a>
        </div>

        <!-- Mode: Success -->
        <div id="success-onboarding">
            <h2 style="color: var(--accent-green);">Account Created</h2>
            <p>Your GUARD account is ready. Your unique Shield Key has been generated.</p>
            <button onclick="window.location.href='/dashboard'">Enter Dashboard</button>
        </div>

        <div id="error-msg"></div>
    </div>

    <script>
        const BASE_URL = window.location.origin;

        function toggleMode(mode) {
            document.getElementById('view-login').style.display = mode === 'login' ? 'block' : 'none';
            document.getElementById('view-signup').style.display = mode === 'signup' ? 'block' : 'none';
            document.getElementById('error-msg').style.display = 'none';
        }

        async function handleSignup() {
            const site = document.getElementById('signup-site').value;
            const email = document.getElementById('signup-email').value;
            const pass = document.getElementById('signup-pass').value;
            const error = document.getElementById('error-msg');

            if (!site || !email || !pass) return showUIError("All fields are required");

            try {
                const res = await fetch(`${BASE_URL}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass, site_name: site })
                });
                const data = await res.json();
                
                if (res.ok) {
                    localStorage.setItem('guard_token', data.access_token);
                    document.getElementById('view-signup').style.display = 'none';
                    document.getElementById('success-onboarding').style.display = 'block';
                } else {
                    showUIError(data.detail || "Signup failed");
                }
            } catch (e) { showUIError("Connection error. Is the server live?"); }
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            try {
                const res = await fetch(`${BASE_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password: pass })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('guard_token', data.access_token);
                    window.location.href = '/dashboard';
                } else {
                    showUIError(data.detail || "Invalid credentials");
                }
            } catch (e) { showUIError("Connection error"); }
        }

        function showUIError(msg) {
            const error = document.getElementById('error-msg');
            error.innerText = msg;
            error.style.display = 'block';
        }
    </script>
</body>
</html>
